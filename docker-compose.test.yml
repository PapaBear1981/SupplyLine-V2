services:
  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: supplyline-test-runner
    environment:
      - FLASK_ENV=testing
      - TESTING=true
      - SECRET_KEY=test-secret-key-for-testing-12345
      - JWT_SECRET_KEY=test-jwt-secret-key-for-testing-12345
      - DATABASE_URL=sqlite:///test.db
