name: Legacy Features (Kit Management + Requests)

# Runs the test suites with FEATURE_KIT_MANAGEMENT and FEATURE_REQUESTS turned
# ON so the deactivated UIs and APIs don't bit-rot while disabled. Triggered
# nightly + on demand. Not gated to main CI — `continue-on-error: true` during
# the initial deactivation window so a regression here doesn't block releases.

on:
  schedule:
    - cron: '17 7 * * *'  # 07:17 UTC nightly
  workflow_dispatch:

env:
  FEATURE_KIT_MANAGEMENT: 'true'
  FEATURE_REQUESTS: 'true'
  VITE_FEATURE_KIT_MANAGEMENT: 'true'
  VITE_FEATURE_REQUESTS: 'true'

jobs:
  backend-legacy-tests:
    name: Backend Legacy Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt
      - name: Run full pytest (legacy flags ON)
        working-directory: ./backend
        env:
          FLASK_ENV: testing
          DATABASE_URL: sqlite:///test.db
        run: |
          pytest -v --tb=short --color=yes

  frontend-legacy-tests:
    name: Frontend Legacy Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install
        working-directory: ./frontend
        run: npm ci --no-audit --no-fund
      - name: Vitest (legacy flags ON)
        working-directory: ./frontend
        run: npm run test:run
